<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<title>무한매수 다이어리</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="무한매수 다이어리">
<style>
  :root{
    --navy-900:#0F1E38;
    --navy-800:#1F3864;
    --navy-700:#2E5496;
    --navy-100:#EAEFF9;
    --paper:#F6F4EE;
    --card:#FFFFFF;
    --ink:#1B2333;
    --ink-soft:#6B7280;
    --line:#E6E2D8;
    --gold:#C7962C;
    --gold-soft:#F4E7C7;
    --up:#E5484D;      /* 한국식: 상승/이익 = 빨강 */
    --up-bg:#FDEBEC;
    --down:#2F6FE4;    /* 한국식: 하락/손실 = 파랑 */
    --down-bg:#EAF1FE;
    --radius:16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--paper);
    position:relative;
  }
  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    padding:calc(14px + var(--safe-top)) 20px 14px;
    background:var(--navy-800);
    color:#fff;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar h1{
    font-size:17px; margin:0; font-weight:800; letter-spacing:-.2px;
    display:flex; align-items:center; gap:8px;
  }
  .topbar .mark{
    width:26px;height:26px;border-radius:8px;
    background:linear-gradient(145deg,var(--gold),#8f6d1c);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:900;color:#1F3864;
  }
  .topbar .sub{font-size:11px; color:#C9D3E6; font-weight:500; margin-top:1px;}
  .icon-btn{
    width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.12);
    border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  }

  /* ---------- Scroll content ---------- */
  .content{flex:1; padding:16px 16px calc(96px + var(--safe-bottom));}

  /* ---------- Dashboard summary ---------- */
  .hero{
    background:radial-gradient(120% 140% at 15% 0%, var(--navy-700) 0%, var(--navy-800) 55%, var(--navy-900) 100%);
    border-radius:20px; padding:22px 20px; color:#fff; margin-bottom:16px;
    position:relative; overflow:hidden;
  }
  .hero:before{
    content:""; position:absolute; right:-40px; top:-40px; width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle, rgba(199,150,44,.35), transparent 70%);
  }
  .hero .label{font-size:12px; color:#B9C4DC; font-weight:600; letter-spacing:.2px;}
  .hero .amount{font-size:30px; font-weight:800; margin-top:6px; letter-spacing:-.5px;}
  .hero .pl-row{display:flex; align-items:center; gap:8px; margin-top:10px;}
  .pill{
    font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px;
  }
  .pill.up{background:rgba(229,72,77,.18); color:#FF8B8F;}
  .pill.down{background:rgba(47,111,228,.2); color:#7FA8FF;}
  .pill.flat{background:rgba(255,255,255,.14); color:#DADFEA;}
  .hero .meta{font-size:12px; color:#AEB9CF; margin-top:2px;}
  .hero-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}
  .hero-stat{background:rgba(255,255,255,.08); border-radius:12px; padding:10px 12px;}
  .hero-stat .k{font-size:10.5px; color:#B9C4DC; font-weight:600;}
  .hero-stat .v{font-size:15px; font-weight:800; margin-top:3px;}

  .section-title{
    font-size:13px; font-weight:800; color:var(--navy-800); margin:20px 2px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-title span.count{font-weight:600; color:var(--ink-soft); font-size:12px;}

  .broker-row{
    display:flex; gap:10px; overflow-x:auto; padding-bottom:2px; margin-bottom:4px;
    scrollbar-width:none;
  }
  .broker-row::-webkit-scrollbar{display:none;}
  .broker-chip{
    flex:0 0 auto; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; min-width:126px;
  }
  .broker-chip .name{font-size:12.5px; font-weight:800; color:var(--navy-800);}
  .broker-chip .val{font-size:15px; font-weight:800; margin-top:6px;}
  .broker-chip .sub{font-size:11px; color:var(--ink-soft); margin-top:2px;}

  /* ---------- Cards (stock list) ---------- */
  .stock-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 14px 12px; margin-bottom:10px; position:relative;
  }
  .stock-card .top-row{display:flex; align-items:flex-start; justify-content:space-between;}
  .stock-card .name{font-size:16px; font-weight:800; color:var(--ink);}
  .stock-card .broker-tag{font-size:10.5px; color:var(--ink-soft); font-weight:600; margin-top:2px;}
  .badge{
    font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:999px; white-space:nowrap;
  }
  .badge.wait{background:#EEF0F3; color:#7A8296;}
  .badge.progress{background:var(--gold-soft); color:#8A660F;}
  .badge.done{background:#E7F6EC; color:#1E8A4C;}
  .badge.exit{background:#EFEAF9; color:#6B4FBF;}

  .progress-wrap{margin-top:10px;}
  .progress-bar{height:7px; border-radius:999px; background:#EEEDE6; overflow:hidden;}
  .progress-bar .fill{height:100%; background:linear-gradient(90deg,var(--navy-700),var(--gold)); border-radius:999px;}
  .progress-labels{display:flex; justify-content:space-between; font-size:10.5px; color:var(--ink-soft); margin-top:5px;}

  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px;}
  .stat-grid .cell .k{font-size:10px; color:var(--ink-soft); font-weight:600;}
  .stat-grid .cell .v{font-size:13px; font-weight:800; margin-top:2px;}
  .stat-grid .cell .v.up{color:var(--up);}
  .stat-grid .cell .v.down{color:var(--down);}

  .empty-state{
    text-align:center; padding:44px 20px; color:var(--ink-soft);
  }
  .empty-state .big{font-size:34px; margin-bottom:8px;}
  .empty-state .t{font-size:14px; font-weight:700; color:var(--ink);}
  .empty-state .d{font-size:12.5px; margin-top:4px; line-height:1.5;}

  .add-tile{
    border:1.5px dashed #C9C3B2; border-radius:var(--radius); padding:16px; text-align:center;
    color:var(--navy-700); font-weight:700; font-size:13.5px; background:#FBFAF6;
  }

  /* ---------- Detail view ---------- */
  .back-row{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .back-btn{
    width:32px;height:32px;border-radius:10px;background:var(--card); border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--navy-800);
  }
  .detail-title{font-size:18px; font-weight:800;}
  .detail-sub{font-size:11.5px; color:var(--ink-soft); font-weight:600;}

  .kv-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px;
    margin-bottom:14px;
  }
  .kv-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 10px;}
  .kv-grid .k{font-size:11px; color:var(--ink-soft); font-weight:600;}
  .kv-grid .v{font-size:15px; font-weight:800; margin-top:3px;}
  .kv-grid .v.up{color:var(--up);}
  .kv-grid .v.down{color:var(--down);}
  .kv-grid .v.editable{color:var(--navy-700); text-decoration:underline dotted; text-underline-offset:3px;}

  .action-row{display:flex; gap:8px; margin-bottom:16px;}
  .btn{
    flex:1; border:none; border-radius:12px; padding:12px 10px; font-size:13.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn.buy{background:var(--up-bg); color:var(--up);}
  .btn.sell{background:var(--down-bg); color:var(--down);}
  .btn.ghost{background:var(--card); color:var(--ink-soft); border:1px solid var(--line); flex:0 0 44px;}

  .hist-item{
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px;
    display:flex; align-items:center; gap:12px; margin-bottom:8px;
  }
  .hist-badge{
    width:38px;height:38px;border-radius:11px; display:flex;align-items:center;justify-content:center;
    font-size:12px; font-weight:800; flex:0 0 auto;
  }
  .hist-badge.buy{background:var(--up-bg); color:var(--up);}
  .hist-badge.sell{background:var(--down-bg); color:var(--down);}
  .hist-mid{flex:1; min-width:0;}
  .hist-mid .l1{font-size:13.5px; font-weight:700;}
  .hist-mid .l2{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .hist-amt{text-align:right;}
  .hist-amt .a1{font-size:13.5px; font-weight:800;}
  .hist-amt .a2{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}
  .hist-del{
    width:24px;height:24px;flex:0 0 auto;border-radius:8px;border:none;background:#F1EFE9;color:#9B9686;
    font-size:12px; margin-left:2px;
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    max-width:480px; margin:0 auto;
    background:#FFFFFFEE; backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex; padding:8px 6px calc(8px + var(--safe-bottom));
  }
  .nav-btn{
    flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
    color:#9AA1B0; font-size:10.5px; font-weight:700; padding:6px 0;
  }
  .nav-btn .ic{font-size:19px;}
  .nav-btn.active{color:var(--navy-800);}
  .nav-btn.active .ic{transform:translateY(-1px);}

  /* ---------- Sheet / Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(15,20,35,.5); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .overlay.open{opacity:1; pointer-events:auto;}
  .sheet{
    width:100%; max-width:480px; background:var(--paper);
    border-radius:22px 22px 0 0; padding:10px 20px calc(24px + var(--safe-bottom));
    transform:translateY(100%); transition:transform .25s cubic-bezier(.2,.9,.3,1);
    max-height:88vh; overflow-y:auto;
  }
  .overlay.open .sheet{transform:translateY(0);}
  .sheet-handle{width:38px;height:4px;background:#DDD8CB;border-radius:99px; margin:6px auto 14px;}
  .sheet h2{font-size:16.5px; margin:0 0 14px; font-weight:800;}
  .seg{display:flex; background:#EFEDE5; border-radius:12px; padding:3px; margin-bottom:16px;}
  .seg button{
    flex:1; border:none; background:none; padding:10px 0; border-radius:9px; font-size:13.5px; font-weight:800;
    color:var(--ink-soft);
  }
  .seg button.on.buy{background:var(--up); color:#fff;}
  .seg button.on.sell{background:var(--down); color:#fff;}

  .field{margin-bottom:14px;}
  .field label{font-size:11.5px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:6px;}
  .field input, .field select{
    width:100%; border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:12px 13px;
    font-size:15px; font-weight:600; color:var(--ink); font-family:inherit;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--navy-700);}
  .amount-preview{
    background:var(--navy-100); border-radius:12px; padding:12px 14px; display:flex; justify-content:space-between;
    align-items:center; margin-bottom:16px;
  }
  .amount-preview .k{font-size:12px; font-weight:700; color:var(--navy-800);}
  .amount-preview .v{font-size:17px; font-weight:900; color:var(--navy-800);}
  .save-btn{
    width:100%; border:none; background:var(--navy-800); color:#fff; padding:15px; border-radius:14px;
    font-size:15px; font-weight:800;
  }
  .save-btn:disabled{background:#C9C3B2; color:#fff;}
  .danger-btn{
    width:100%; border:none; background:var(--up-bg); color:var(--up); padding:14px; border-radius:14px;
    font-size:14px; font-weight:800; margin-top:6px;
  }
  .hint{font-size:11.5px; color:var(--ink-soft); margin-top:-6px; margin-bottom:14px; line-height:1.5;}
  .toast{
    position:fixed; left:50%; bottom:104px; transform:translateX(-50%);
    background:#1B2333; color:#fff; padding:10px 18px; border-radius:999px; font-size:12.5px; font-weight:700;
    z-index:60; opacity:0; pointer-events:none; transition:opacity .2s, bottom .2s;
  }
  .toast.show{opacity:1; bottom:118px;}

  .settings-list{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .settings-item{
    display:flex; align-items:center; justify-content:space-between; padding:14px 16px;
    border-bottom:1px solid var(--line); font-size:14px; font-weight:700;
  }
  .settings-item:last-child{border-bottom:none;}
  .settings-item .d{font-size:11px; color:var(--ink-soft); font-weight:500; margin-top:2px;}
  .settings-item button{border:none; background:var(--navy-100); color:var(--navy-800); font-weight:800; padding:8px 14px; border-radius:10px; font-size:12.5px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* ============ 데이터 정의 ============ */
const BROKERS = ["토스증권","삼성증권","키움증권"];
const STORAGE_KEY = "infinite_buy_diary_v1";
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr = () => new Date().toISOString().slice(0,10);

function defaultData(){
  return {
    brokers:{
      "토스증권":{ stocks:[
        {id:uid(), name:"TQQQ", totalSeed:4000, currentPrice:86.4, txns:[
          {id:uid(), type:"buy", date:"2026-01-15", price:81.2, qty:18}
        ]},
        {id:uid(), name:"SOXL", totalSeed:2000, currentPrice:21.1, txns:[
          {id:uid(), type:"buy", date:"2026-02-03", price:22.5, qty:22}
        ]}
      ]},
      "삼성증권":{stocks:[]},
      "키움증권":{stocks:[]}
    }
  };
}

let DB = load();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const d = defaultData();
  save(d);
  return d;
}
function save(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function persist(){ save(DB); }

/* ============ 계산 로직 (가중평균원가법) ============ */
function computeStock(stock){
  const txns = [...stock.txns].sort((a,b)=> a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  let qty=0, cost=0, realized=0, buyRounds=0;
  for(const t of txns){
    if(t.type==="buy"){
      qty += t.qty; cost += t.qty*t.price; buyRounds++;
    } else {
      const avg = qty>0 ? cost/qty : 0;
      const sellQty = Math.min(t.qty, qty);
      realized += (t.price-avg)*sellQty;
      cost -= avg*sellQty;
      qty -= sellQty;
      if(qty < 1e-9){ qty=0; cost=0; }
    }
  }
  const avgPrice = qty>0 ? cost/qty : 0;
  const principal = cost; // 매수원금(보유분 기준)
  const evalAmt = qty*(stock.currentPrice||0);
  const unrealizedPL = evalAmt - principal;
  const totalPL = unrealizedPL + realized;
  const remainSeed = (stock.totalSeed||0) - principal;
  const perRound = (stock.totalSeed||0)/40;
  const round = Math.min(buyRounds,40);
  const progress = round/40;
  let status = "대기";
  if(txns.length===0) status="대기";
  else if(qty===0) status="청산";
  else if(round>=40) status="완료";
  else status="진행중";
  return {qty,avgPrice,principal,evalAmt,unrealizedPL,realized,totalPL,remainSeed,perRound,round,progress,status,
    returnPct: principal>0 ? unrealizedPL/principal : 0};
}

function brokerTotals(brokerName){
  const stocks = DB.brokers[brokerName].stocks;
  let principal=0, evalAmt=0, pl=0;
  stocks.forEach(s=>{ const c=computeStock(s); principal+=c.principal; evalAmt+=c.evalAmt; pl+=c.unrealizedPL; });
  return {count:stocks.length, principal, evalAmt, pl, ret: principal>0?pl/principal:0};
}
function grandTotals(){
  let principal=0, evalAmt=0, pl=0, count=0;
  BROKERS.forEach(b=>{ const t=brokerTotals(b); principal+=t.principal; evalAmt+=t.evalAmt; pl+=t.pl; count+=t.count; });
  return {principal, evalAmt, pl, count, ret: principal>0?pl/principal:0};
}

/* ============ 포맷 유틸 ============ */
const fmt = (n, d=0) => {
  if(n===null||n===undefined||isNaN(n)) return "-";
  return n.toLocaleString('ko-KR', {maximumFractionDigits:d, minimumFractionDigits:d});
};
const fmtPct = (n) => (n>=0? "+":"") + (n*100).toFixed(1) + "%";
const fmtMoney = (n) => (n<0? "-":"") + fmt(Math.abs(n),0);

/* ============ 라우팅 상태 ============ */
let VIEW = {tab:"dashboard", broker:null, stockId:null};
let SHEET = null; // {type:'txn'|'newstock'|'editprice', ...}

/* ============ 렌더 ============ */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderTopbar() + '<div class="content">' + renderContent() + '</div>' + renderBottomNav();
  renderSheet();
}

function renderTopbar(){
  const titles = {dashboard:"무한매수 다이어리", broker:VIEW.broker, stock:"", settings:"설정"};
  let title = "무한매수 다이어리";
  let sub = "";
  if(VIEW.tab==="broker"){ title = VIEW.broker; sub = "종목 목록"; }
  if(VIEW.tab==="stockDetail"){
    const s = findStock(VIEW.stockId);
    title = s ? s.name : "";
    sub = VIEW.broker;
  }
  if(VIEW.tab==="settings"){ title="설정"; sub="데이터 백업 및 초기화"; }
  return `
  <div class="topbar">
    <div>
      <h1>${VIEW.tab==="dashboard" ? '<span class="mark">무</span> 무한매수 다이어리' : escapeHtml(title)}</h1>
      ${sub?`<div class="sub">${escapeHtml(sub)}</div>`:''}
    </div>
    ${VIEW.tab==="stockDetail" ? `<button class="icon-btn" onclick="goBack()">✕</button>` : ''}
  </div>`;
}

function renderBottomNav(){
  const items = [
    {key:"dashboard", ic:"🏠", label:"대시보드"},
    {key:"토스증권", ic:"💠", label:"토스"},
    {key:"삼성증권", ic:"🔷", label:"삼성"},
    {key:"키움증권", ic:"🟨", label:"키움"},
    {key:"settings", ic:"⚙️", label:"설정"},
  ];
  return `<div class="bottom-nav">${items.map(it=>{
    const active = (VIEW.tab==="dashboard" && it.key==="dashboard") ||
                   (VIEW.tab!=="dashboard" && VIEW.tab!=="settings" && VIEW.broker===it.key) ||
                   (VIEW.tab==="settings" && it.key==="settings");
    return `<button class="nav-btn ${active?'active':''}" onclick="navTo('${it.key}')">
      <span class="ic">${it.ic}</span><span>${it.label}</span>
    </button>`;
  }).join('')}</div>`;
}

function navTo(key){
  if(key==="dashboard"){ VIEW={tab:"dashboard", broker:null, stockId:null}; }
  else if(key==="settings"){ VIEW={tab:"settings", broker:null, stockId:null}; }
  else { VIEW={tab:"broker", broker:key, stockId:null}; }
  render();
}
function goBack(){
  if(VIEW.tab==="stockDetail"){ VIEW={tab:"broker", broker:VIEW.broker, stockId:null}; }
  else { VIEW={tab:"dashboard", broker:null, stockId:null}; }
  render();
}
function findStock(id){
  for(const b of BROKERS){ const s = DB.brokers[b].stocks.find(x=>x.id===id); if(s) return s; }
  return null;
}
function findStockBroker(id){
  for(const b of BROKERS){ if(DB.brokers[b].stocks.find(x=>x.id===id)) return b; }
  return null;
}

function renderContent(){

function escapeHtml(s){
  return String(s??"").replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderSheet(){
  let sheetHtml = document.getElementById('sheetOverlay');
  if(sheetHtml) sheetHtml.remove();
  if(!SHEET) return;
  const wrap = document.createElement('div');
  wrap.id = 'sheetOverlay';
  wrap.className = 'overlay';
  wrap.onclick = (e)=>{ if(e.target===wrap) closeSheet(); };
  wrap.innerHTML = `<div class="sheet">${sheetContent()}</div>`;
  document.body.appendChild(wrap);
  requestAnimationFrame(()=> wrap.classList.add('open'));
}

  <div class="seg">
    <button class="${isBuy?'on buy':''}" onclick="setTxnType('buy')">매수</button>

  </div>

function setTxnType(t){ SHEET.txnType=t; render(); }
function refreshSheet(){
  const wrap = document.getElementById('sheetOverlay');
  if(wrap){ wrap.querySelector('.sheet').innerHTML = sheetContent(); }
}
function saveTxn(){
  const s = findStock(SHEET.stockId);
  const price = Number(SHEET.price), qty = Number(SHEET.qty);
  if(!price || !qty || qty<=0 || price<=0) return;
  if(SHEET.txnType==="sell"){
    const c = computeStock(s);
    if(qty > c.qty + 1e-9){ toast(`보유 수량(${fmt(c.qty,4)})보다 많이 매도할 수 없어요`); return; }
  }
  s.txns.push({id:uid(), type:SHEET.txnType, date:SHEET.date||todayStr(), price, qty});
  persist();
  toast(SHEET.txnType==="buy" ? "매수 내역이 저장됐어요" : "매도 내역이 저장됐어요");
  SHEET=null;
  render();
}
function deleteTxn(stockId, txnId){
  const s = findStock(stockId);
  s.txns = s.txns.filter(t=>t.id!==txnId);

  render();

/* ============ 백업/복원 ============ */
function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:"application/json"});
  downloadBlob(blob, `무한매수_백업_${todayStr()}.json`);
  toast("백업 파일을 저장했어요");
}
function importJSON(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.brokers) throw new Error("invalid");
      DB = data; persist(); render();
      toast("백업을 불러왔어요");
    }catch(err){ toast("파일을 읽을 수 없어요"); }
  };
  reader.readAsText(file);
}
function exportCSV(){
  let rows = [["증권사","종목명","구분","날짜","단가","수량","금액"]];
  BROKERS.forEach(b=>{
    DB.brokers[b].stocks.forEach(s=>{
      s.txns.forEach(t=>{
        rows.push([b,s.name,t.type==="buy"?"매수":"매도",t.date,t.price,t.qty,(t.price*t.qty).toFixed(2)]);
      });
    });
  });
  const csv = "\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  downloadBlob(blob, `매수매도내역_${todayStr()}.csv`);
  toast("CSV 파일을 저장했어요");
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function resetAll(){
  if(!confirm("정말 모든 데이터를 초기화할까요? 되돌릴 수 없어요.")) return;
  DB = {brokers:{"토스증권":{stocks:[]},"삼성증권":{stocks:[]},"키움증권":{stocks:[]}}};
  persist(); render();
  toast("초기화했어요");
}

let toastTimer=null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 1800);
}

/* ============ 초기 실행 ============ */
render();

/* PWA: 서비스워커 등록 (오프라인 지원) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
